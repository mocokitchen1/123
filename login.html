<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - St Mary's Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        'primary-dark': '#0284c7',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 font-sans flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center mb-10">
            <div class="text-5xl mb-4">🏥</div>
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter italic">St Mary's Clinic</h1>
            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-2">Sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2 tracking-widest">Email Address</label>
                <input type="email" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-primary focus:bg-white transition-all outline-none" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2 tracking-widest">Password</label>
                <input type="password" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-primary focus:bg-white transition-all outline-none" placeholder="••••••••">
            </div>
            
            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center gap-2 cursor-pointer font-bold text-slate-500">
                    <input type="checkbox" class="w-4 h-4 accent-primary"> Remember me
                </label>
                <a href="#" class="font-bold text-primary hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-primary-dark hover:-translate-y-1 transition-all">
                Sign In 🔐
            </button>
        </form>

        <div class="mt-8 pt-8 border-t text-center">
            <p class="text-sm font-bold text-slate-400">
                New patient? <a href="register.html" class="text-primary hover:underline">Create an account</a>
            </p>
            <div class="mt-4 flex justify-center gap-4 text-[10px] font-black uppercase tracking-widest">
                <a href="index.html" class="text-slate-400 hover:text-slate-600">← Back to Website</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            
            // Simulation: If email contains 'staff' or 'admin', go to staff dashboard
            if (email.includes('staff') || email.includes('admin')) {
                window.location.href = 'dashboard-staff.html';
            } else {
                window.location.href = 'dashboard-patient.html';
            }
        });
    </script>
</body>
</html>
